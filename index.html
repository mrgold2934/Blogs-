<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disruptor Media — Global Intelligence Network</title>
    <style>
        :root {
            --bg: #ffffff;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
            --live: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--text-main); padding-bottom: 60px; }
        header { position: sticky; top: 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); z-index: 100; padding: 18px 24px; }
        .nav-container { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 1.3rem; font-weight: 800; text-transform: uppercase; color: #000; }
        .live-status { display: inline-flex; align-items: center; gap: 6px; background: rgba(37, 99, 235, 0.05); padding: 4px 12px; border-radius: 99px; font-size: 0.75rem; font-weight: 600; color: var(--accent); border: 1px solid var(--border); }
        .pulse-dot { width: 6px; height: 6px; background-color: var(--live); border-radius: 50%; animation: pulse 1.2s infinite alternate; }
        @keyframes pulse { from { opacity: 0.3; } to { opacity: 1; } }
        .hero-section { max-width: 1100px; margin: 40px auto 20px; padding: 0 24px; }
        .search-bar { width: 100%; max-width: 400px; background: #f8fafc; border: 1px solid var(--border); padding: 12px 16px; border-radius: 8px; outline: none; }
        .main-layout { max-width: 1100px; margin: 0 auto; padding: 0 24px; display: grid; grid-template-columns: 1fr; gap: 40px; }
        @media (min-width: 768px) { .main-layout { grid-template-columns: 2.2fr 1fr; } }
        #blog-grid { display: flex; flex-direction: column; gap: 40px; }
        .premium-card { background: var(--surface); padding-bottom: 40px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 16px; }
        .post-title { font-size: 1.75rem; font-weight: 700; }
        .post-excerpt { color: var(--text-muted); font-size: 1.05rem; }
        .author-profile { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: #f1f5f9; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .sidebar { display: flex; flex-direction: column; gap: 24px; }
        .widget { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 24px; }
        .widget-title { font-size: 0.95rem; font-weight: 700; text-transform: uppercase; margin-bottom: 16px; }
        .loader-wrapper { text-align: center; padding: 40px; color: var(--text-muted); font-weight: 500; }
        .error-box { background: #fff1f2; border: 1px solid #fecdd3; color: #9f1239; padding: 20px; border-radius: 8px; line-height: 1.6; }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">DISRUPTOR DAILY</div>
            <div class="live-status"><span class="pulse-dot"></span> LIVE PIPELINE</div>
        </div>
    </header>

    <div class="hero-section">
        <input type="text" class="search-bar" id="blog-search" placeholder="Search publications..." oninput="filterPosts()">
    </div>

    <main class="main-layout">
        <section id="blog-grid">
            <div class="loader-wrapper" id="main-loader">Establishing secure connection stream...</div>
        </section>

        <aside class="sidebar">
            <div class="widget">
                <h3 class="widget-title">Engine Information</h3>
                <p style="font-size:0.9rem; color:var(--text-muted)">Status: <strong id="engine-status" style="color:orange">Syncing...</strong></p>
            </div>
        </aside>
    </main>

    <script>
        // Clean direct parsing from your explicit link
        const ORIGINAL_LINK = "https://google.com";
        
        // Open Proxy Wrapper to bypass browser CORS blockades instantly
        const PROXY_URL = `https://allorigins.win{encodeURIComponent(ORIGINAL_LINK)}&timestamp=${new Date().getTime()}`;

        let allCachedPosts = [];

        async function fetchBlogs() {
            try {
                const response = await fetch(PROXY_URL);
                if (!response.ok) throw new Error("Proxy network gateway rejected stream layout.");
                
                const json = await response.json();
                const text = json.contents;

                if (!text || text.includes("<!DOCTYPE html")) {
                    throw new Error("Empty spreadsheet or incorrect text layout received.");
                }

                // Split csv cleanly by lines
                let lines = text.split(/\r?\n/);
                let rows = lines.map(line => line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                
                rows.shift(); // Clear title headers row
                
                allCachedPosts = rows.filter(r => r && r.length >= 3 && r[0] !== "");

                document.getElementById("engine-status").innerText = "Connected!";
                document.getElementById("engine-status").style.color = "green";
                
                filterPosts();
            } catch (error) {
                console.error(error);
                document.getElementById("engine-status").innerText = "Connection Refused";
                document.getElementById("engine-status").style.color = "red";
                
                document.getElementById("blog-grid").innerHTML = `
                    <div class="error-box">
                        <h3>⚠️ Network Connection Failure</h3>
                        <p style="margin-top:8px;"><strong>Details:</strong> Browser network policies are restricting the sheet layout.</p>
                        <p style="margin-top:12px; font-size:0.9rem; color:#4c0519;">
                            Please check your Google Sheet share rules: ensure it is marked public to anyone with the link.
                        </p>
                    </div>
                `;
            }
        }

        function filterPosts() {
            const query = document.getElementById('blog-search').value.toLowerCase();
            const container = document.getElementById('blog-grid');
            container.innerHTML = '';

            let matches = allCachedPosts;
            if (query) {
                matches = allCachedPosts.filter(r => r.join(' ').toLowerCase().includes(query));
            }

            if (matches.length === 0) {
                container.innerHTML = '<div class="loader-wrapper">Connected! Add your first text entry row inside your Google Sheet to watch it display here live.</div>';
                return;
            }

            for (let i = matches.length - 1; i >= 0; i--) {
                const row = matches[i];
                const title = row[0] || "Untitled Post";
                const author = row[1] || "Anonymous Author";
                const timestamp = row[2] || "Live Feed";
                const content = row[3] || "";
                
                const initials = author.substring(0,2).toUpperCase();

                const article = document.createElement('article');
                article.className = 'premium-card';
                article.innerHTML = `
                    <div style="font-size:0.75rem; font-weight:700; color:var(--accent);">INTELLIGENCE REPORT</div>
                    <h2 class="post-title">${title}</h2>
                    <p class="post-excerpt">${content}</p>
                    <div class="author-profile">
                        <div class="avatar">${initials}</div>
                        <div><strong>${author}</strong> • ${timestamp}</div>
                    </div>
                `;
                container.appendChild(article);
            }
        }

        fetchBlogs();
        setInterval(fetchBlogs, 6000); // Poll for new data rows every 6 seconds smoothly
    </script>
</body>
</html>
