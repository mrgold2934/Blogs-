<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disruptor Media — Global Intelligence Network</title>
    <style>
        :root {
            --bg: #ffffff;
            --surface: #ffffff;
            --surface-hover: #fafafa;
            --border: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.05);
            --live: #10b981;
            --like: #ef4444;
            --repost: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg); color: var(--text-main); line-height: 1.5; padding-bottom: 60px; }
        
        header { position: sticky; top: 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); z-index: 100; padding: 18px 24px; }
        .nav-container { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; text-transform: uppercase; color: #000; }
        
        .live-status { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-glow); padding: 4px 12px; border-radius: 99px; font-size: 0.75rem; font-weight: 600; color: var(--accent); border: 1px solid var(--border); }
        .pulse-dot { width: 6px; height: 6px; background-color: var(--live); border-radius: 50%; box-shadow: 0 0 8px var(--live); animation: pulse 1.2s infinite alternate; }
        @keyframes pulse { from { opacity: 0.3; } to { opacity: 1; } }

        .hero-section { max-width: 1100px; margin: 40px auto 20px; padding: 0 24px; }
        .search-bar { width: 100%; max-width: 400px; background: #f8fafc; border: 1px solid var(--border); padding: 12px 16px; border-radius: 8px; color: var(--text-main); font-size: 0.95rem; outline: none; }
        .search-bar:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px var(--accent-glow); }

        .main-layout { max-width: 1100px; margin: 0 auto; padding: 0 24px; display: grid; grid-template-columns: 1fr; gap: 40px; }
        @media (min-width: 768px) { .main-layout { grid-template-columns: 2.2fr 1fr; } }

        #blog-grid { display: flex; flex-direction: column; gap: 40px; }
        .premium-card { background: var(--surface); padding-bottom: 40px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 16px; }
        
        .img-wrapper { width: 100%; position: relative; padding-top: 50%; background: #f1f5f9; overflow: hidden; border-radius: 4px; }
        .card-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        .category-tag { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--accent); letter-spacing: 0.5px; }
        .post-title { font-size: 1.75rem; font-weight: 700; color: var(--text-main); line-height: 1.25; }
        .post-excerpt { color: var(--text-muted); font-size: 1.05rem; line-height: 1.6; }
        
        .author-profile { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: #f1f5f9; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.75rem; }
        .meta-text { display: flex; flex-direction: column; font-size: 0.85rem; }
        .author-name { font-weight: 600; }
        .date-read { color: var(--text-muted); }

        /* Modern Engagement Bar */
        .engagement-bar { display: flex; align-items: center; gap: 24px; padding: 12px 0; border-top: 1px dashed var(--border); border-bottom: 1px dashed var(--border); margin-top: 8px; }
        .engage-btn { background: none; border: none; display: flex; align-items: center; gap: 6px; font-size: 0.9rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: color 0.15s; }
        .engage-btn:hover { color: var(--text-main); }
        .engage-btn.liked { color: var(--like); }
        .engage-btn.disliked { color: var(--text-main); }
        .engage-btn.reposted { color: var(--repost); }

        /* Comments Engine UI */
        .comments-section { background: #f8fafc; padding: 20px; border-radius: 8px; margin-top: 12px; display: none; flex-direction: column; gap: 16px; }
        .comments-section.active { display: flex; }
        .comment-input-group { display: flex; gap: 10px; }
        .comment-input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; outline: none; }
        .comment-btn { background: var(--text-main); color: #fff; border: none; padding: 0 16px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .comments-list { display: flex; flex-direction: column; gap: 12px; max-height: 250px; overflow-y: auto; }
        .comment-item { background: #fff; padding: 10px 14px; border-radius: 6px; border: 1px solid var(--border); font-size: 0.9rem; }
        .comment-meta { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }

        /* Sidebar Widgets */
        .sidebar { display: flex; flex-direction: column; gap: 24px; }
        .widget { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 24px; }
        .widget-title { font-size: 0.95rem; font-weight: 700; text-transform: uppercase; margin-bottom: 16px; }
        .metrics-list { display: flex; flex-direction: column; gap: 12px; font-size: 0.9rem; }
        .metric-item { display: flex; justify-content: space-between; color: var(--text-muted); border-bottom: 1px dashed var(--border); padding-bottom: 8px; }
        .metric-val { font-weight: 600; color: var(--text-main); }
        .loader-wrapper { text-align: center; padding: 40px; color: var(--text-muted); }
    </style>
</head>
